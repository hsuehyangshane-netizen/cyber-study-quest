  <path class="arrow" d="M300 220 L355 275"/><path class="arrow" d="M450 220 L395 275"/>
  <path class="line" d="M360 315 L390 360"/>
  <text class="txt" x="265" y="145">Convergent boundary</text>
  <text class="small" x="145" y="415">oceanic plate</text><text class="small" x="500" y="415">continental plate</text>
  <text class="small" x="365" y="300">trench</text>

