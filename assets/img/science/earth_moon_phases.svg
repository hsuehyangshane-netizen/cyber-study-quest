<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520">
  <rect width="100%" height="100%" fill="white"/>
  <style>
    .axis{stroke:#111;stroke-width:3;fill:none;stroke-linecap:round}
    .line{stroke:#111;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#111;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#111;stroke-width:2;fill:none;stroke-dasharray:8 8;stroke-linecap:round}
    .bar{stroke:#111;stroke-width:3;fill:#f7f7f7}
    .txt{font-family:serif;font-size:24px;fill:#111}
    .small{font-family:serif;font-size:18px;fill:#111}
    .grid{stroke:#ddd;stroke-width:1;fill:none}
    .arrow{stroke:#111;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#111"/></marker></defs>
  
  <circle cx="380" cy="260" r="55" fill="white" stroke="#111" stroke-width="4"/><text class="txt" x="350" y="345">Earth</text>
  <circle cx="380" cy="95" r="26" fill="white" stroke="#111" stroke-width="3"/><text class="small" x="355" y="65">A</text>
  <circle cx="545" cy="260" r="26" fill="white" stroke="#111" stroke-width="3"/><text class="small" x="575" y="267">B</text>
  <circle cx="380" cy="425" r="26" fill="white" stroke="#111" stroke-width="3"/><text class="small" x="355" y="472">C</text>
  <circle cx="215" cy="260" r="26" fill="white" stroke="#111" stroke-width="3"/><text class="small" x="180" y="267">D</text>
  <path class="arrow" d="M75 115 H205"/><path class="arrow" d="M75 145 H205"/><path class="arrow" d="M75 175 H205"/>
  <text class="small" x="65" y="95">Sunlight</text>
  <circle cx="380" cy="260" r="170" fill="none" stroke="#111" stroke-width="2" stroke-dasharray="8 8"/>

</svg>