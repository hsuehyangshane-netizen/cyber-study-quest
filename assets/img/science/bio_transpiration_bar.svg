<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520">
  <rect width="100%" height="100%" fill="white"/>
  <style>
    .axis{stroke:#111;stroke-width:3;fill:none;stroke-linecap:round}
    .line{stroke:#111;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#111;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#111;stroke-width:2;fill:none;stroke-dasharray:8 8;stroke-linecap:round}
    .bar{stroke:#111;stroke-width:3;fill:#f7f7f7}
    .txt{font-family:serif;font-size:24px;fill:#111}
    .small{font-family:serif;font-size:18px;fill:#111}
    .grid{stroke:#ddd;stroke-width:1;fill:none}
    .arrow{stroke:#111;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#111"/></marker></defs>
  
  <path class="axis" d="M100 430 H690"/>
  <path class="axis" d="M100 430 V70"/>
  <g class="grid"><path d="M100 370 H690 M100 310 H690 M100 250 H690 M100 190 H690 M100 130 H690"/></g>
  <rect class="bar" x="150" y="340" width="70" height="90"/><rect class="bar" x="260" y="250" width="70" height="180"/>
  <rect class="bar" x="370" y="130" width="70" height="300"/><rect class="bar" x="480" y="190" width="70" height="240"/>
  <rect class="bar" x="590" y="310" width="70" height="120"/>
  <text class="small" x="135" y="462">8-9</text><text class="small" x="245" y="462">10-11</text><text class="small" x="355" y="462">12-13</text><text class="small" x="465" y="462">14-15</text><text class="small" x="575" y="462">16-17</text>
  <text class="txt" x="175" y="45">Bubble movement distance in each hour</text>

</svg>