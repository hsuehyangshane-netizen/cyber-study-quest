<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <rect width="100%" height="100%" fill="white"/>
  <style>
    .line{stroke:#111;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#111;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#111;stroke-width:2.5;fill:none;stroke-dasharray:8 8;stroke-linecap:round}
    .txt{font-family:serif;font-size:26px;fill:#111}
    .small{font-family:serif;font-size:22px;fill:#111}
    .grid{stroke:#ddd;stroke-width:1;fill:none}
  </style>
  
  <circle class="line" cx="360" cy="260" r="180"/>
  <circle cx="360" cy="260" r="5" fill="#111"/>
  <path class="line" d="M360 260 L250 120"/>
  <path class="line" d="M360 260 L510 135"/>
  <path class="line" d="M250 120 L510 135"/>
  <path class="thin" d="M250 120 L370 420 L510 135"/>
  <text class="txt" x="350" y="225">120°</text>
  <text class="txt" x="375" y="395">x</text>
  <text class="small" x="340" y="285">O</text>

</svg>